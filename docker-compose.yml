version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: accounting_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: accounting_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounting_saas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    container_name: accounting_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/accounting_saas
      - SECRET_KEY=supersecretkey-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: accounting_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Utilisation de l'URL publique Codespaces pour que le client (navigateur) puisse joindre l'API
      - NEXT_PUBLIC_API_URL=https://fantastic-zebra-qvqqg5xprrrw2xwv-8000.app.github.dev
    stdin_open: true
    tty: true
    depends_on:
      - backend
    restart: always
    command: npm run dev

volumes:
  postgres_data:
